<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            font-family: 'Inter', Arial, sans-serif;
            background-color: #ffffff;
            color: #000000;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 600px;
            margin: 20px auto;
            border: 1px solid #000000;
            padding: 40px;
        }

        .header {
            border-bottom: 2px solid #000000;
            padding-bottom: 20px;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 800;
            font-size: 24px;
        }

        .content {
            line-height: 1.6;
            font-size: 16px;
            margin-bottom: 30px;
        }

        .footer {
            margin-top: 40px;
            font-size: 10px;
            color: #666666;
            border-top: 1px solid #eeeeee;
            padding-top: 20px;
            text-transform: uppercase;
        }

        .btn {
            display: inline-block;
            padding: 15px 30px;
            background-color: #000000;
            color: #ffffff;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">ANUNCIO OFICIAL</div>
        <div class="content">
            {{ content | safe }}
        </div>
        <div class="footer">
            ESTE ES UN COMUNICADO OFICIAL DE LAIKA CLUB.<br>
            NO RESPONDAS A ESTE CORREO.
        </div>
    </div>
</body>

</html>
